name: Refresh Star History

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: star-history-${{ github.repository }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh chart data
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Send authenticated repository snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INGEST_TOKEN: ${{ secrets.STAR_HISTORY_INGEST_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          STAR_HISTORY_ENDPOINT: ${{ vars.STAR_HISTORY_ENDPOINT }}
        run: |
          set -euo pipefail
          test -n "${INGEST_TOKEN}"
          test -n "${STAR_HISTORY_ENDPOINT}"
          payload=$(jq -cn --arg repository "${REPOSITORY}" '{repository: $repository}')
          curl \
            --fail-with-body \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 15 \
            --max-time 240 \
            --request POST \
            --header "Authorization: Bearer ${INGEST_TOKEN}" \
            --header "X-GitHub-Token: ${GITHUB_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "${payload}" \
            "${STAR_HISTORY_ENDPOINT}"
